<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@webdesserts/ui — Design</title>
    <script>
      // Prevent FOUC — apply persisted color mode before render
      const mode = localStorage.getItem("color-mode");
      if (mode === "light") document.documentElement.style.colorScheme = "light";
      else if (mode === "dark") document.documentElement.style.colorScheme = "dark";
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
